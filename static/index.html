<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRONOX | Oracle of Time / Oráculo del Tiempo</title>
    <style>
        :root {
            --oro: #D4AF37;
            --fondo-base: #0a0000;
            --tarjeta: rgba(25, 25, 25, 0.9);
            --texto: #f0f0f0;
            /* Colores de Prioridad Requeridos */
            --rojo-prioridad: #ff4d4d;
            --amarillo-prioridad: #ffcc00;
            --azul-prioridad: #3399ff;
        }

        /* --- FONDO DE RELOJ ROJO ANIMADO --- */
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--fondo-base);
            color: var(--texto);
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Efecto de manecilla de reloj girando en el fondo */
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            width: 200vw;
            height: 200vw;
            margin-left: -100vw;
            margin-top: -100vw;
            background: conic-gradient(from 0deg, transparent 0%, rgba(255, 0, 0, 0.1) 10%, transparent 20%);
            animation: rotacionReloj 15s linear infinite;
            z-index: -1;
        }

        @keyframes rotacionReloj {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            color: var(--oro);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 30px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        .contenedor {
            display: flex;
            gap: 25px;
            width: 90%;
            max-width: 1100px;
            margin-top: 30px;
            flex-wrap: wrap;
            padding-bottom: 50px;
        }

        .panel {
            background: var(--tarjeta);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #330000;
            flex: 1;
            min-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
        }

        .panel h2 {
            color: var(--oro);
            border-bottom: 2px solid var(--oro);
            padding-bottom: 10px;
            font-size: 1.4em;
        }

        label { display: block; margin-top: 15px; font-weight: bold; color: #ccc; }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 8px;
            border: 1px solid #444;
            background: rgba(0,0,0,0.6);
            color: white;
            box-sizing: border-box;
        }

        button {
            background: var(--oro);
            color: black;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            margin-top: 20px;
        }

        button:hover {
            background: #f1d56e;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        /* --- ANIMACIONES DE TAREAS --- */
        .destino-card {
            background: rgba(40, 40, 40, 0.8);
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: entradaTarea 0.5s ease-out; /* Animación de creación */
            transition: 0.4s;
        }

        @keyframes entradaTarea {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .salida-tarea {
            opacity: 0;
            transform: translateX(50px);
            pointer-events: none;
        }

        /* Colores por Prioridad Requeridos */
        .prio-alta { border-left: 8px solid var(--rojo-prioridad); }
        .prio-media { border-left: 8px solid var(--amarillo-prioridad); }
        .prio-baja { border-left: 8px solid var(--azul-prioridad); }

        .btn-delete {
            background: #660000;
            color: white;
            width: auto;
            padding: 8px 15px;
            margin: 0;
            font-size: 0.8em;
        }
        .btn-delete:hover { background: #ff0000; }
    </style>
</head>
<body>

    <h1>⚡ Oracle of Time / Oráculo del Tiempo ⚡</h1>

    <div class="contenedor">
        <div class="panel">
            <h2>📜 Forge Destiny / Forjar Destino</h2>
            <form id="form-cronox">
                <label>Oracle ID / ID Oráculo (DEST-01):</label>
                <input type="text" id="id_oraculo" required>
                
                <label>Task Name / Nombre de la Tarea:</label>
                <input type="text" id="nombre" required>
                
                <label>Days Left / Días Restantes:</label>
                <input type="number" id="dias" min="1" required>
                
                <label>Priority Level / Nivel de Prioridad:</label>
                <select id="prioridad">
                    <option value="alta">High / Alta (Rojo)</option>
                    <option value="media">Medium / Media (Amarillo)</option>
                    <option value="baja">Low / Baja (Azul)</option>
                </select>
                
                <button type="submit">Consecrate / Consagrar</button>
            </form>
            <p id="msg" style="color: var(--oro); text-align: center; margin-top: 15px; font-weight: bold;"></p>
        </div>

        <div class="panel">
            <h2>🏛️ Destiny Tapestry / Tapiz del Destino</h2>
            <button onclick="cargarTodo()" style="background: #222; color: #fff; margin-bottom: 20px;">🔄 Update / Actualizar</button>
            <div id="lista"></div>
        </div>
    </div>

    <script>
        const API = "http://127.0.0.1:8000"; 

        // Crear tarea
        document.getElementById("form-cronox").addEventListener("submit", async (e) => {
            e.preventDefault();
            const data = {
                id_oraculo: document.getElementById("id_oraculo").value,
                nombre: document.getElementById("nombre").value,
                dias: parseInt(document.getElementById("dias").value),
                prioridad: document.getElementById("prioridad").value
            };

            const res = await fetch(`${API}/forjar`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data)
            });
            const resData = await res.json();
            document.getElementById("msg").innerText = resData.mensaje;
            if(resData.status === "success") {
                document.getElementById("form-cronox").reset();
                cargarTodo();
            }
        });

        // Cargar y colorear por prioridad
        async function cargarTodo() {
            const res = await fetch(`${API}/destinos/ordenados`);
            const data = await res.json();
            const box = document.getElementById("lista");
            box.innerHTML = "";

            if(data.destinos_ordenados) {
                data.destinos_ordenados.forEach(d => {
                    // Mapeo de colores por prioridad
                    const clasePrio = `prio-${d.prioridad.toLowerCase()}`;
                    
                    box.innerHTML += `
                        <div class="destino-card ${clasePrio}" id="card-${d.id_oraculo}">
                            <div>
                                <strong style="color: var(--oro); font-size: 1.1em;">${d.nombre}</strong><br>
                                <small>ID: ${d.id_oraculo} | Days/Días: ${d.dias} | Energy/Energía: ${d.energia}</small>
                            </div>
                            <button class="btn-delete" onclick="borrar('${d.id_oraculo}')">Destroy / Destruir</button>
                        </div>
                    `;
                });
            }
        }

        // Eliminar con animación
        async function borrar(id) {
            const card = document.getElementById(`card-${id}`);
            card.classList.add('salida-tarea'); // Inicia animación de salida
            
            setTimeout(async () => {
                await fetch(`${API}/destruir/${id}`, {method: "DELETE"});
                cargarTodo();
            }, 400);
        }

        cargarTodo();
    </script>
</body>
</html>
