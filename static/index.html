<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CRONOX: Olimpo 2.0</title>
    <style>
        :root { --oro: #d4af37; --marmol: #f4f1ea; --oscuro: #2c2c2c; --rojo: #c0392b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--marmol); color: var(--oscuro); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .templo { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid var(--oro); width: 100%; max-width: 450px; }
        h1 { color: var(--oro); letter-spacing: 5px; text-align: center; margin-bottom: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--oro); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b8860b; transform: translateY(-2px); }
        .recordatorio { background: #f7f7f7; border-left: 5px solid var(--oro); padding: 15px; margin: 10px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.5s ease; }
        .prioridad-tag { font-size: 0.8rem; color: var(--oro); font-weight: bold; border: 1px solid var(--oro); padding: 2px 5px; border-radius: 4px; }
        .btn-del { width: auto; background: var(--rojo); padding: 5px 12px; margin: 0; font-size: 1.2rem; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <h1>⚡ CRONOX: OLIMPO ⚡</h1>
    <div class="templo">
        <input type="text" id="titulo" placeholder="Tarea para los dioses...">
        
        <select id="tipo">
            <option value="⚔️ Guerra">⚔️ Guerra (Trabajo)</option>
            <option value="📜 Sabiduría">📜 Sabiduría (Estudio)</option>
            <option value="🍷 Placer">🍷 Placer (Ocio)</option>
        </select>

        <input type="number" id="horas" placeholder="Horas de plazo (ej: 1.5)" step="0.5">
        <input type="number" id="importancia" placeholder="Importancia (1 al 10)" min="1" max="10">
        
        <button onclick="enviarAlOlimpo()">Invocar Recordatorio</button>
        
        <hr style="border: 0.5px solid #eee; margin: 20px 0;">
        <div id="lista"></div>
    </div>

    <script>
        // Update view from backend data / Actualizar vista con datos del backend
        async function actualizar() {
            const res = await fetch('/api/recordatorios');
            const recordatorios = await res.json();
            
            const contenedor = document.getElementById('lista');
            contenedor.innerHTML = recordatorios.map((r, i) => `
                <div class="recordatorio">
                    <div>
                        <strong>${r.tipo} | ${r.titulo}</strong><br>
                        <small>Expira: ${r.fecha_limite}</small>
                        <div class="prioridad-tag">Prioridad: ${r.prioridad}</div>
                    </div>
                    <button class="btn-del" onclick="desterrar(${i})" title="Enviar al Tártaro">💀</button>
                </div>
            `).join('');
        }

        // Send new task to Python / Enviar nueva tarea a Python
        async function enviarAlOlimpo() {
            const data = {
                titulo: document.getElementById('titulo').value,
                tipo: document.getElementById('tipo').value,
                tiempo_horas: parseFloat(document.getElementById('horas').value),
                importancia: parseInt(document.getElementById('importancia').value)
            };

            if(!data.titulo || isNaN(data.tiempo_horas)) return alert("Mortal, llena los campos.");

            await fetch('/api/recordatorios', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            actualizar();
        }

        // Remove task / Eliminar tarea
        async function desterrar(idx) {
            await fetch(`/api/recordatorios/${idx}`, { method: 'DELETE' });
            actualizar();
        }

        // Initial load / Carga inicial
        actualizar();
    </script>
</body>
</html>
